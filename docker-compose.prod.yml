# Production deploy cho ao3.ducvu.vn
# Usage: docker compose -f docker-compose.prod.yml up -d
#
# Lần đầu chạy: bash scripts/init-prod.sh
# CF Tunnel trỏ ao3.ducvu.vn → http://localhost:3000

services:
  db:
    image: mariadb:10.5.4-focal
    container_name: ao3_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ao3_production
      MYSQL_USER: ao3_user
      MYSQL_PASSWORD: ${DB_PASSWORD}
    command:
      [
        "mysqld",
        "--sql-mode=STRICT_TRANS_TABLES,NO_ZERO_IN_DATE,NO_ZERO_DATE,ERROR_FOR_DIVISION_BY_ZERO,NO_AUTO_CREATE_USER,NO_ENGINE_SUBSTITUTION",
      ]
    volumes:
      - ./data/mysql:/var/lib/mysql
    networks:
      - ao3_net
    # Không expose port ra ngoài — CF Tunnel handle

  redis:
    image: redis:7.2.4
    container_name: ao3_redis
    restart: unless-stopped
    volumes:
      - ./data/redis:/data
    networks:
      - ao3_net

  es:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.3.0
    container_name: ao3_es
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=false
      - "ES_JAVA_OPTS=-Xms1500m -Xmx1500m"
      - xpack.security.enabled=false
    volumes:
      - ./data/es:/usr/share/elasticsearch/data
    networks:
      - ao3_net

  mc:
    image: memcached:1.5
    container_name: ao3_memcached
    restart: unless-stopped
    networks:
      - ao3_net

  web:
    build:
      context: .
      dockerfile: ./config/docker/Dockerfile
    image: ao3_web:latest
    container_name: ao3_web
    restart: unless-stopped
    env_file: .env
    environment:
      RAILS_ENV: production
      RAILS_SERVE_STATIC_FILES: "true"
      RAILS_LOG_TO_STDOUT: "true"
    command: bash -c "rm -f tmp/pids/server.pid && bundle exec rails s -p 3000 -b '0.0.0.0'"
    volumes:
      - .:/otwa
      - ./data/uploads:/otwa/public/system
      - ./logs:/otwa/log
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - db
      - redis
      - es
      - mc
      - worker
    networks:
      - ao3_net

  worker:
    build:
      context: .
      dockerfile: ./config/docker/Dockerfile
    image: ao3_web:latest
    container_name: ao3_worker
    restart: unless-stopped
    env_file: .env
    environment:
      RAILS_ENV: production
      QUEUE: "*"
    command: bash -c "bundle exec rake environment resque:scheduler & bundle exec rake environment resque:work"
    volumes:
      - .:/otwa
      - ./logs:/otwa/log
    depends_on:
      - db
      - redis
    networks:
      - ao3_net

networks:
  ao3_net:
    driver: bridge
