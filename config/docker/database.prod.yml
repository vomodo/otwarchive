# Production database config — đọc từ env vars
# Copy file này thành config/database.yml trước khi chạy production
# Hoặc set DATABASE_URL env var (Rails sẽ tự dùng)

default: &default
  adapter: mysql2
  encoding: utf8mb4
  collation: utf8mb4_unicode_ci
  host: <%= ENV.fetch('DB_HOST', 'db') %>
  port: <%= ENV.fetch('DB_PORT', 3306) %>
  username: <%= ENV.fetch('DB_USER', 'ao3_user') %>
  password: <%= ENV['DB_PASSWORD'] %>
  pool: <%= ENV.fetch('RAILS_MAX_THREADS', 5) %>
  timeout: 5000

production:
  <<: *default
  database: <%= ENV.fetch('DB_NAME', 'ao3_production') %>
